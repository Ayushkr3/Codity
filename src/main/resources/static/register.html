<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Job Scheduler</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Create an account</h1>
    <form id="registerForm">
      <label>Name</label>
      <input type="text" id="name" required>

      <label>Email</label>
      <input type="email" id="email" required>

      <label>Password</label>
      <input type="password" id="password" required minlength="6">

      <button class="btn" type="submit" style="width:100%">Register</button>
    </form>
        <div id="msg" style="display:none"></div>
    <div class="switch">Already have an account? <a href="index.html">Log in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if (getToken()) window.location.href = "dashboard.html";

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("msg");
    hideBox(msg);
    try {
        const data = await apiFetch("/auth/register", "POST", {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        });
        if (!data) return;
        saveAuth(data);
        window.location.href = "dashboard.html";
    } catch (err) {
        showError(msg, err);
    }
});
</script>

</body>
</html>
