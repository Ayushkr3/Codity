<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Job Scheduler</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
</head>
<body>

<main>
  <h1 style="margin-top:0">Dashboard</h1>

  <div class="card">
    <div class="toolbar">
      <div>
        <label>Project</label>
        <select id="projectSelect"></select>
      </div>
      <div>
        <label>Queue</label>
        <select id="queueSelect"><option value="">All queues</option></select>
      </div>
    </div>
    <div id="msg" style="display:none"></div>
  </div>

  <div class="grid-3">
    <div class="card stat-card"><div class="n" id="statQueues">-</div><div class="l">Queues in project</div></div>
    <div class="card stat-card"><div class="n" id="statWorkers">-</div><div class="l">Active workers</div></div>
    <div class="card stat-card"><div class="n" id="statRunning">-</div><div class="l">Jobs running now</div></div>
    <div class="card stat-card"><div class="n" id="statQueued">-</div><div class="l">Jobs queued</div></div>
    <div class="card stat-card"><div class="n" id="statDlq">-</div><div class="l">Dead letter entries (all projects)</div></div>
    <div class="card stat-card"><div class="n" id="statCompleted">-</div><div class="l">Completed (this scope)</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h2>Job status distribution</h2>
      <div class="chart-box"><canvas id="statusChart"></canvas></div>
    </div>
    <div class="card">
      <h2>Backlog per queue (queued + running)</h2>
      <div class="chart-box"><canvas id="queueChart"></canvas></div>
    </div>
  </div>

  <div class="card">
    <h2>Workers</h2>
    <table id="workersTable">
      <thead><tr><th>Worker</th><th>Host</th><th>Status</th><th>Active jobs</th><th>Last heartbeat</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="workersEmpty" class="empty" style="display:none">No workers have reported in yet.</div>
  </div>
</main>

<script src="js/api.js"></script>
<script>
requireAuth();
renderNav("dashboard.html");

const STATUS_LABELS = ["QUEUED","SCHEDULED","CLAIMED","RUNNING","COMPLETED","FAILED","DEAD_LETTER","CANCELLED"];
const STATUS_COLORS = ["#d97706","#f59e0b","#60a5fa","#2563eb","#16a34a","#f87171","#dc2626","#6b7280"];

let statusChart, queueChart;
let projects = [];
let queues = [];

async function init() {
    const msg = document.getElementById("msg");
    try {
        projects = await apiFetch("/projects") || [];
    } catch (err) {
        showError(msg, err);
        return;
    }

    const projectSelect = document.getElementById("projectSelect");
    projectSelect.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
    projectSelect.addEventListener("change", () => loadQueuesForProject(projectSelect.value));
    document.getElementById("queueSelect").addEventListener("change", refreshDashboard);

    if (projects.length) {
        await loadQueuesForProject(projects[0].id);
    } else {
        document.getElementById("statQueues").textContent = "0";
    }

    await loadWorkers();
    await loadDlqCount();
}

async function loadQueuesForProject(projectId) {
    if (!projectId) return;
    const msg = document.getElementById("msg");
    try {
        const list = await apiFetch(`/projects/${projectId}/queues`) || [];
        queues = list;
    } catch (err) {
        showError(msg, err);
        return;
    }
    const queueSelect = document.getElementById("queueSelect");
    queueSelect.innerHTML = `<option value="">All queues</option>` +
        queues.map(q => `<option value="${q.id}">${q.name}</option>`).join("");
    document.getElementById("statQueues").textContent = queues.length;
    await refreshDashboard();
}

// Fetches full stats (jobCountsByStatus) for every queue in the current project,
// since the list endpoint intentionally omits stats to stay cheap.
async function fetchAllQueueStats() {
    const results = await Promise.all(queues.map(q => apiFetch(`/queues/${q.id}`)));
    return results;
}

async function refreshDashboard() {
    const msg = document.getElementById("msg");
    hideBox(msg);
    if (!queues.length) {
        renderStatusChart({});
        renderQueueChart([]);
        return;
    }

    let allStats;
    try {
        allStats = await fetchAllQueueStats();
    } catch (err) {
        showError(msg, err);
        return;
    }

    const queueId = document.getElementById("queueSelect").value;
    const scoped = queueId ? allStats.filter(q => String(q.id) === String(queueId)) : allStats;

    // Aggregate status counts across the selected scope.
    const totals = {};
    STATUS_LABELS.forEach(s => totals[s] = 0);
    scoped.forEach(q => {
        const counts = q.jobCountsByStatus || {};
        STATUS_LABELS.forEach(s => totals[s] += (counts[s] || 0));
    });

    document.getElementById("statRunning").textContent = totals.RUNNING + totals.CLAIMED;
    document.getElementById("statQueued").textContent = totals.QUEUED + totals.SCHEDULED;
    document.getElementById("statCompleted").textContent = totals.COMPLETED;

    renderStatusChart(totals);

    // Backlog-per-queue bar chart always shows the whole project, regardless
    // of the queue filter, so it stays useful as a comparison view.
    const backlog = allStats.map(q => ({
        name: q.name,
        value: (q.jobCountsByStatus?.QUEUED || 0) + (q.jobCountsByStatus?.SCHEDULED || 0) + (q.jobCountsByStatus?.RUNNING || 0)
    }));
    renderQueueChart(backlog);
}

function renderStatusChart(totals) {
    const ctx = document.getElementById("statusChart");
    const data = STATUS_LABELS.map(s => totals[s] || 0);
    if (statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels: STATUS_LABELS,
            datasets: [{ data, backgroundColor: STATUS_COLORS }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function renderQueueChart(backlog) {
    const ctx = document.getElementById("queueChart");
    if (queueChart) queueChart.destroy();
    queueChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: backlog.map(b => b.name),
            datasets: [{ label: "Backlog", data: backlog.map(b => b.value), backgroundColor: "#2563eb" }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
            plugins: { legend: { display: false } }
        }
    });
}

async function loadWorkers() {
    const workers = await apiFetch("/workers") || [];
    document.getElementById("statWorkers").textContent =
        workers.filter(w => w.status === "ACTIVE").length;

    const tbody = document.querySelector("#workersTable tbody");
    tbody.innerHTML = "";
    document.getElementById("workersEmpty").style.display = workers.length ? "none" : "block";
    workers.forEach(w => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="muted">${w.workerId.slice(0, 8)}…</td>
            <td>${w.hostname || "-"}</td>
            <td><span class="badge ${w.status}">${w.status}</span></td>
            <td>${w.activeJobCount}</td>
            <td class="muted">${fmtDate(w.lastHeartbeatAt)}</td>`;
        tbody.appendChild(tr);
    });
}

async function loadDlqCount() {
    const page = await apiFetch("/dlq?size=1");
    document.getElementById("statDlq").textContent = page ? (page.totalElements ?? page.content.length) : 0;
}

init();
</script>

</body>
</html>
