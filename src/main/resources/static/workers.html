<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workers - Job Scheduler</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
</head>
<body>

<main>
  <h1 style="margin-top:0">Workers</h1>

  <div class="grid-2">
    <div class="card">
      <h2>Worker status</h2>
      <div class="chart-box"><canvas id="statusChart"></canvas></div>
    </div>
    <div class="card">
      <div class="grid-3" style="height:100%">
        <div class="stat-card"><div class="n" id="statTotal">-</div><div class="l">Total workers</div></div>
        <div class="stat-card"><div class="n" id="statActive">-</div><div class="l">Active</div></div>
        <div class="stat-card"><div class="n" id="statJobs">-</div><div class="l">Jobs in flight</div></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>All workers</h2>
    <div id="msg" style="display:none"></div>
    <table id="table">
      <thead><tr><th>Worker ID</th><th>Host</th><th>Status</th><th>Active jobs</th><th>Started</th><th>Last heartbeat</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">No workers have reported in yet. Start the scheduler application to register one.</div>
  </div>
</main>

<script src="js/api.js"></script>
<script>
requireAuth();
renderNav("workers.html");

let chart;

async function load() {
    const msg = document.getElementById("msg");
    hideBox(msg);
    let workers;
    try {
        workers = await apiFetch("/workers") || [];
    } catch (err) {
        showError(msg, err);
        return;
    }

    document.getElementById("statTotal").textContent = workers.length;
    document.getElementById("statActive").textContent = workers.filter(w => w.status === "ACTIVE").length;
    document.getElementById("statJobs").textContent = workers.reduce((sum, w) => sum + (w.activeJobCount || 0), 0);

    const counts = { ACTIVE: 0, IDLE: 0, STOPPED: 0 };
    workers.forEach(w => { counts[w.status] = (counts[w.status] || 0) + 1; });

    const ctx = document.getElementById("statusChart");
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels: Object.keys(counts),
            datasets: [{ data: Object.values(counts), backgroundColor: ["#16a34a", "#d97706", "#6b7280"] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";
    document.getElementById("empty").style.display = workers.length ? "none" : "block";
    workers.forEach(w => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="muted">${w.workerId}</td>
            <td>${w.hostname || "-"}</td>
            <td><span class="badge ${w.status}">${w.status}</span></td>
            <td>${w.activeJobCount}</td>
            <td class="muted">${fmtDate(w.startedAt)}</td>
            <td class="muted">${fmtDate(w.lastHeartbeatAt)}</td>`;
        tbody.appendChild(tr);
    });
}

load();
setInterval(load, 10000); // workers heartbeat every 5s server-side, so this stays roughly live
</script>

</body>
</html>
